<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Image Caption Tool Pro | TiDB Connected</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <link rel="stylesheet" href="image-caption-tool.css">
</head>
<body>

<button class="scroll-btn scroll-up" id="scrollUpBtn"><i class="fas fa-arrow-up"></i></button>
<button class="scroll-btn scroll-down" id="scrollDownBtn"><i class="fas fa-arrow-down"></i></button>
<div id="toastContainer" class="toast-container"></div>

<div class="container">
    <div class="admin-link">
        <button class="btn-admin" id="adminPanelBtn"><i class="fas fa-user-shield"></i> Admin Panel</button>
        <button class="dark-toggle" id="darkModeToggle"><i class="fas fa-moon"></i> Dark Mode</button>
    </div>

    <div class="header">
        <h1><i class="fas fa-image"></i> Image Caption Tool Pro</h1>
        <p>TiDB Connected | Live Data | Real-time Analytics</p>
        <div class="stats-bar">
            <div class="stat-card"><i class="fas fa-chart-line"></i> Captions <span id="totalCaptions">0</span></div>
            <div class="stat-card"><i class="fas fa-heart"></i> Reactions <span id="totalReactions">0</span></div>
            <div class="stat-card"><i class="fas fa-share-alt"></i> Shares <span id="totalShares">0</span></div>
        </div>
    </div>

    <div id="adminPanel" style="display:none;">
        <h2>Admin Dashboard</h2>
        <div id="adminStats"></div>
    </div>

    <div class="tool-card" data-tool-id="19" data-tool-name="Image Caption Tool">
        <div class="tool-layout">
            <div class="image-panel">
                <h2><i class="fas fa-upload"></i> Upload Image</h2>
                <div class="upload-area" id="uploadArea">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>Click or drag & drop image</p>
                    <input type="file" id="fileInput" accept="image/*" style="display:none">
                </div>
                <img id="imagePreview" style="display:none; max-width:100%; border-radius:12px;">
                
                <h2><i class="fas fa-filter"></i> Image Filters</h2>
                <div class="filters-bar" id="filtersBar">
                    <button class="filter-btn active" data-filter="none">Normal</button>
                    <button class="filter-btn" data-filter="grayscale">Grayscale</button>
                    <button class="filter-btn" data-filter="sepia">Sepia</button>
                    <button class="filter-btn" data-filter="blur">Blur</button>
                    <button class="filter-btn" data-filter="brightness">Bright</button>
                    <button class="filter-btn" data-filter="contrast">High Contrast</button>
                </div>
            </div>
            
            <div class="caption-panel">
                <h2><i class="fas fa-quote-right"></i> Caption Editor</h2>
                
                <div class="formatting-tools">
                    <button class="format-btn" onclick="formatText('bold')"><b>B</b></button>
                    <button class="format-btn" onclick="formatText('italic')"><i>I</i></button>
                    <button class="format-btn" onclick="formatText('underline')"><u>U</u></button>
                    <input type="color" id="textColor" value="#000000" onchange="formatText('foreColor', this.value)" style="width:35px;height:35px;border-radius:8px;">
                    <select id="fontSize" onchange="formatText('fontSize', this.value)">
                        <option value="1">10px</option><option value="3">12px</option>
                        <option value="4">14px</option><option value="5">18px</option>
                        <option value="6">24px</option><option value="7">32px</option>
                    </select>
                </div>
                
                <div contenteditable="true" id="captionEditor" class="caption-editor"></div>
                
                <div class="action-btns">
                    <button class="action-btn" id="generateBtn"><i class="fas fa-magic"></i> Generate Caption</button>
                    <button class="action-btn" id="clearBtn"><i class="fas fa-trash"></i> Clear</button>
                    <button class="action-btn" id="undoBtn"><i class="fas fa-undo"></i> Undo</button>
                    <button class="action-btn" id="redoBtn"><i class="fas fa-redo"></i> Redo</button>
                </div>
                
                <div class="action-btns">
                    <button class="action-btn" id="downloadPNGBtn"><i class="fas fa-download"></i> PNG</button>
                    <button class="action-btn" id="downloadJPGBtn"><i class="fas fa-download"></i> JPG</button>
                    <button class="action-btn" id="copyBtn"><i class="fas fa-copy"></i> Copy Image</button>
                    <button class="action-btn" id="aiCaptionBtn"><i class="fas fa-robot"></i> AI Caption</button>
                </div>
                
                <h2><i class="fas fa-layer-group"></i> Templates</h2>
                <div class="templates-grid" id="templatesGrid">
                    <div class="template-card" data-template="modern">Modern</div>
                    <div class="template-card" data-template="vintage">Vintage</div>
                    <div class="template-card" data-template="elegant">Elegant</div>
                    <div class="template-card" data-template="bold">Bold</div>
                    <div class="template-card" data-template="minimal">Minimal</div>
                    <div class="template-card" data-template="fun">Fun</div>
                </div>
                
                <div class="tool-usage"><i class="fas fa-eye"></i> Used: <span id="toolUsageCount">0</span> times</div>
                
                <div class="tool-reactions" data-tool-id="19">
                    <button class="reaction-btn" data-reaction="like">👍 <span class="reaction-count">0</span></button>
                    <button class="reaction-btn" data-reaction="love">❤️ <span class="reaction-count">0</span></button>
                    <button class="reaction-btn" data-reaction="wow">😮 <span class="reaction-count">0</span></button>
                    <button class="reaction-btn" data-reaction="sad">😢 <span class="reaction-count">0</span></button>
                    <button class="reaction-btn" data-reaction="angry">😠 <span class="reaction-count">0</span></button>
                    <button class="reaction-btn" data-reaction="laugh">😂 <span class="reaction-count">0</span></button>
                    <button class="reaction-btn" data-reaction="celebrate">🎉 <span class="reaction-count">0</span></button>
                </div>
                
                <div class="tool-social-shares" data-tool-id="19" data-tool-name="Image Caption Tool">
                    <button class="share-btn" data-platform="facebook"><i class="fab fa-facebook-f"></i></button>
                    <button class="share-btn" data-platform="twitter"><i class="fab fa-twitter"></i></button>
                    <button class="share-btn" data-platform="linkedin"><i class="fab fa-linkedin-in"></i></button>
                    <button class="share-btn" data-platform="whatsapp"><i class="fab fa-whatsapp"></i></button>
                    <button class="share-btn" data-platform="email"><i class="fas fa-envelope"></i></button>
                </div>
            </div>
        </div>
        
        <div class="output-container" id="outputContainer" style="display:none;">
            <h2><i class="fas fa-eye"></i> Preview</h2>
            <div id="outputContent"></div>
        </div>
        
        <div class="page-share-container">
            <button class="btn-page-share" id="pageShareBtn"><i class="fas fa-share-alt"></i> Share This Page</button>
        </div>
    </div>
</div>

<script src="image-caption-tool.js"></script>
</body>
</html>
