<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Blog to Ad Converter Pro | AI Ad Creator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="blog-post-to-ad-converter.css">
</head>
<body>

<button class="scroll-btn scroll-up" id="scrollUpBtn"><i class="fas fa-arrow-up"></i></button>
<button class="scroll-btn scroll-down" id="scrollDownBtn"><i class="fas fa-arrow-down"></i></button>
<div id="toastContainer" class="toast-container"></div>

<div class="container">
    <div class="header">
        <h1><i class="fas fa-magic"></i> Blog to Ad Converter Pro</h1>
        <p>Transform blog posts into stunning social media ads | Live Analytics</p>
        <div class="stats-bar">
            <div class="stat-card"><i class="fas fa-chart-line"></i> Conversions <span id="totalConversions">0</span></div>
            <div class="stat-card"><i class="fas fa-heart"></i> Reactions <span id="totalReactions">0</span></div>
            <div class="stat-card"><i class="fas fa-share-alt"></i> Shares <span id="totalShares">0</span></div>
        </div>
    </div>

    <div class="tool-card" data-tool-id="17" data-tool-name="Blog to Ad Converter">
        <div class="converter-layout">
            <div class="input-panel">
                <h2><i class="fas fa-edit"></i> Blog Content</h2>
                <div class="form-group">
                    <label>Blog Title</label>
                    <input type="text" id="blogTitle" placeholder="Enter your blog post title...">
                </div>
                <div class="form-group">
                    <label>Blog Content</label>
                    <textarea id="blogContent" rows="6" placeholder="Paste your blog content here..."></textarea>
                </div>
                
                <div class="form-group">
                    <label>Ad Template</label>
                    <select id="adTemplate">
                        <option value="modern">Modern Gradient</option>
                        <option value="minimal">Minimal White</option>
                        <option value="bold">Bold Colors</option>
                        <option value="professional">Professional</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Platform</label>
                    <select id="platformSelect">
                        <option value="facebook">Facebook (1200x630)</option>
                        <option value="instagram">Instagram (1080x1080)</option>
                        <option value="twitter">Twitter (1200x675)</option>
                        <option value="story">Instagram Story (1080x1920)</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Brand Color</label>
                    <div class="brand-colors">
                        <div class="color-option" style="background:#4361ee" onclick="setBrandColor('#4361ee')"></div>
                        <div class="color-option" style="background:#e74c3c" onclick="setBrandColor('#e74c3c')"></div>
                        <div class="color-option" style="background:#2ecc71" onclick="setBrandColor('#2ecc71')"></div>
                        <div class="color-option" style="background:#f39c12" onclick="setBrandColor('#f39c12')"></div>
                        <input type="color" id="customColor" value="#4361ee" onchange="setBrandColor(this.value)">
                    </div>
                </div>
                
                <button class="btn-primary btn-block" id="generateBtn"><i class="fas fa-magic"></i> Generate Ad</button>
                
                <div class="tool-usage"><i class="fas fa-eye"></i> Used: <span class="usage-count" id="toolUsageCount">0</span> times</div>
                
                <div class="tool-reactions" data-tool-id="17">
                    <button class="reaction-btn" data-reaction="like">👍 <span class="reaction-count">0</span></button>
                    <button class="reaction-btn" data-reaction="love">❤️ <span class="reaction-count">0</span></button>
                    <button class="reaction-btn" data-reaction="wow">😮 <span class="reaction-count">0</span></button>
                    <button class="reaction-btn" data-reaction="sad">😢 <span class="reaction-count">0</span></button>
                    <button class="reaction-btn" data-reaction="angry">😠 <span class="reaction-count">0</span></button>
                    <button class="reaction-btn" data-reaction="laugh">😂 <span class="reaction-count">0</span></button>
                    <button class="reaction-btn" data-reaction="celebrate">🎉 <span class="reaction-count">0</span></button>
                </div>
                
                <div class="tool-social-shares" data-tool-id="17" data-tool-name="Blog to Ad Converter">
                    <button class="share-btn" data-platform="facebook"><i class="fab fa-facebook-f"></i></button>
                    <button class="share-btn" data-platform="twitter"><i class="fab fa-twitter"></i></button>
                    <button class="share-btn" data-platform="linkedin"><i class="fab fa-linkedin-in"></i></button>
                    <button class="share-btn" data-platform="whatsapp"><i class="fab fa-whatsapp"></i></button>
                    <button class="share-btn" data-platform="email"><i class="fas fa-envelope"></i></button>
                </div>
            </div>
            
            <div class="output-panel">
                <h2><i class="fas fa-eye"></i> Ad Preview</h2>
                <div class="output-container">
                    <canvas id="adCanvas"></canvas>
                </div>
                <div class="download-options">
                    <button class="btn-success" onclick="downloadAd('png')"><i class="fas fa-download"></i> PNG</button>
                    <button class="btn-success" onclick="downloadAd('jpg')"><i class="fas fa-download"></i> JPG</button>
                    <button class="btn" onclick="copyAdToClipboard()"><i class="fas fa-copy"></i> Copy</button>
                </div>
            </div>
        </div>
        
        <div class="page-share-container">
            <button class="btn-page-share" id="pageShareBtn"><i class="fas fa-share-alt"></i> Share Page</button>
        </div>
    </div>
</div>

<script src="blog-post-to-ad-converter.js"></script>
</body>
</html>
