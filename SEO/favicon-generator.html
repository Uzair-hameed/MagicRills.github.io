<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    
    <!-- PRIMARY SEO -->
    <title>Free Favicon Generator - AI Tool for Website SEO</title>
    <meta name="description" content="Generate professional favicons instantly with our free AI tool. Perfect for websites, blogs, and web applications. Boost your brand identity.">
    <meta name="keywords" content="favicon generator, website icon, SEO tool, brand identity, AI favicon maker, web design">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://magicrills.com/SEO/favicon-generator.html">
    
    <!-- OPEN GRAPH -->
    <meta property="og:title" content="Free Favicon Generator - AI Tool for Website SEO">
    <meta property="og:description" content="Generate professional favicons instantly with our free AI tool. Perfect for websites, blogs, and web applications. Boost your brand identity.">
    <meta property="og:url" content="https://magicrills.com/SEO/favicon-generator.html">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://magicrills.com/pics/og-favicon-generator.webp.webp">
    
    <!-- TWITTER -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Free Favicon Generator - AI Tool for Website SEO">
    <meta name="twitter:description" content="Generate professional favicons instantly with our free AI tool. Perfect for websites, blogs, and web applications. Boost your brand identity.">
    <meta name="twitter:image" content="https://magicrills.com/pics/og-favicon-generator.webp.webp">
    
    <!-- STYLES & FONTS -->
    <link rel="stylesheet" href="favicon-generator.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

<button class="scroll-btn scroll-up" id="scrollUpBtn"><i class="fas fa-arrow-up"></i></button>
<button class="scroll-btn scroll-down" id="scrollDownBtn"><i class="fas fa-arrow-down"></i></button>
<div id="toastContainer" class="toast-container"></div>

<div class="container">
    <div class="header">
        <h1><i class="fas fa-gem"></i> Favicon Generator Pro</h1>
        <p>TiDB Connected | Live Data | Real-time Analytics</p>
        <div class="stats-bar">
            <div class="stat-card"><i class="fas fa-chart-line"></i> Generations <span id="totalGenerations">0</span></div>
            <div class="stat-card"><i class="fas fa-heart"></i> Reactions <span id="totalReactions">0</span></div>
            <div class="stat-card"><i class="fas fa-share-alt"></i> Shares <span id="totalShares">0</span></div>
        </div>
    </div>

    <div class="tool-card" data-tool-id="18" data-tool-name="Favicon Generator">
        <div class="generator-layout">
            <div class="preview-panel">
                <h2><i class="fas fa-eye"></i> Preview</h2>
                <div class="preview-box">
                    <canvas id="faviconCanvas" width="200" height="200"></canvas>
                </div>
                <div class="size-badges">
                    <span class="badge">16x16</span>
                    <span class="badge">32x32</span>
                    <span class="badge">64x64</span>
                    <span class="badge">128x128</span>
                    <span class="badge">256x256</span>
                </div>
                <div class="download-actions">
                    <button class="btn-primary" id="downloadPNG"><i class="fas fa-download"></i> PNG</button>
                    <button class="btn-primary" id="downloadICO"><i class="fas fa-file-archive"></i> ICO</button>
                    <button class="btn-primary" id="downloadZIP"><i class="fas fa-file-zipper"></i> ZIP</button>
                </div>
            </div>

            <div class="controls-panel">
                <h2><i class="fas fa-sliders-h"></i> Controls</h2>
                
                <div class="form-group">
                    <label><i class="fas fa-font"></i> Text (max 3)</label>
                    <input type="text" id="favText" maxlength="3" placeholder="F" value="F">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-palette"></i> Text Color</label>
                    <input type="color" id="textColor" value="#ffffff">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-fill-drip"></i> Background Color</label>
                    <input type="color" id="bgColor" value="#3498db">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-shapes"></i> Shape</label>
                    <select id="shapeType">
                        <option value="square">Square</option>
                        <option value="circle">Circle</option>
                        <option value="rounded">Rounded</option>
                    </select>
                </div>

                <button class="btn-secondary" id="generateBtn"><i class="fas fa-magic"></i> Generate Favicon</button>

                <div class="tool-usage">
                    <i class="fas fa-eye"></i> Used: <span id="toolUsageCount">0</span> times
                </div>

                <div class="tool-reactions" data-tool-id="18">
                    <button class="reaction-btn" data-reaction="like">👍 <span class="reaction-count">0</span></button>
                    <button class="reaction-btn" data-reaction="love">❤️ <span class="reaction-count">0</span></button>
                    <button class="reaction-btn" data-reaction="wow">😮 <span class="reaction-count">0</span></button>
                    <button class="reaction-btn" data-reaction="sad">😢 <span class="reaction-count">0</span></button>
                    <button class="reaction-btn" data-reaction="angry">😠 <span class="reaction-count">0</span></button>
                    <button class="reaction-btn" data-reaction="laugh">😂 <span class="reaction-count">0</span></button>
                    <button class="reaction-btn" data-reaction="celebrate">🎉 <span class="reaction-count">0</span></button>
                </div>

                <div class="tool-social-shares" data-tool-id="18" data-tool-name="Favicon Generator">
                    <button class="share-btn" data-platform="facebook"><i class="fab fa-facebook-f"></i></button>
                    <button class="share-btn" data-platform="twitter"><i class="fab fa-twitter"></i></button>
                    <button class="share-btn" data-platform="linkedin"><i class="fab fa-linkedin-in"></i></button>
                    <button class="share-btn" data-platform="whatsapp"><i class="fab fa-whatsapp"></i></button>
                    <button class="share-btn" data-platform="email"><i class="fas fa-envelope"></i></button>
                </div>
            </div>
        </div>

        <div class="code-section">
            <h3><i class="fas fa-code"></i> HTML Code</h3>
            <div class="code-container">
                <pre id="htmlCode"></pre>
                <button class="btn-copy" id="copyHtmlBtn"><i class="fas fa-copy"></i> Copy</button>
            </div>
        </div>

        <div class="apple-section">
            <h3><i class="fab fa-apple"></i> Apple Touch Icon</h3>
            <canvas id="appleCanvas" width="180" height="180"></canvas>
            <button class="btn-apple" id="downloadApple"><i class="fab fa-apple"></i> Download Apple Icon</button>
        </div>

        <div class="page-share-container">
            <button class="btn-page-share" id="pageShareBtn"><i class="fas fa-share-alt"></i> Share This Page</button>
        </div>
    </div>
</div>

<script src="favicon-generator.js"></script>
</body>
</html>
