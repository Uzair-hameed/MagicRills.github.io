<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Advanced Percentage Calculator | 46 Features</title>
    <link rel="stylesheet" href="advanced-percentage-calculator.css">
</head>
<body>

<div class="app">
    <!-- Header -->
    <div class="header">
        <h1>📊 Advanced Percentage Calculator</h1>
        <div class="stats">📈 Used: <span id="totalUses">0</span> times</div>
    </div>

    <!-- Dropdown Menu - 46 Tools -->
    <select id="toolMenu">
        <option value="0">1. 🔢 Basic Percentage (X% of Y)</option>
        <option value="1">2. ❓ What Percent (A is what % of B)</option>
        <option value="2">3. 📈 Percentage Change</option>
        <option value="3">4. ⬆️ Increase by %</option>
        <option value="4">5. ⬇️ Decrease by %</option>
        <option value="5">6. 🔄 Reverse Percentage (Find Original)</option>
        <option value="6">7. 🏷️ Discount Calculator</option>
        <option value="7">8. 📄 Tax Calculator</option>
        <option value="8">9. 💰 GST Calculator</option>
        <option value="9">10. 🧾 VAT Calculator</option>
        <option value="10">11. 🍽️ Tip Calculator</option>
        <option value="11">12. 📈 Markup Calculator</option>
        <option value="12">13. 📉 Markdown Calculator</option>
        <option value="13">14. 💹 Profit Margin</option>
        <option value="14">15. 💵 ROI Calculator</option>
        <option value="15">16. 📊 CAGR Calculator</option>
        <option value="16">17. 💼 Salary Increase</option>
        <option value="17">18. 🏦 EMI Calculator</option>
        <option value="18">19. 🏠 Home Loan EMI</option>
        <option value="19">20. 🚗 Car Loan EMI</option>
        <option value="20">21. 🎓 Education Loan</option>
        <option value="21">22. 💳 Personal Loan</option>
        <option value="22">23. 📈 Compound Interest</option>
        <option value="23">24. 💰 SIP Calculator</option>
        <option value="24">25. 🏦 FD Calculator</option>
        <option value="25">26. 📅 RD Calculator</option>
        <option value="26">27. ❤️ BMI Calculator</option>
        <option value="27">28. 🎓 Exam Percentage</option>
        <option value="28">29. 🔢 Fraction to %</option>
        <option value="29">30. 📍 Percentage Point</option>
        <option value="30">31. 🔁 Multiple Percentages</option>
        <option value="31">32. 📊 Range Percentage</option>
        <option value="32">33. 🔍 Percentage Finder</option>
        <option value="33">34. ⚖️ Compare Percentages</option>
        <option value="34">35. 💸 Profit/Loss</option>
        <option value="35">36. 💹 Simple Interest</option>
        <option value="36">37. 📈 XIRR Calculator</option>
        <option value="37">38. 💰 Wealth Calculator</option>
        <option value="38">39. 📊 Inflation Calculator</option>
        <option value="39">40. 💵 Future Value</option>
        <option value="40">41. 📉 Present Value</option>
        <option value="41">42. 🏦 Loan Balance</option>
        <option value="42">43. 💳 Credit Card Interest</option>
        <option value="43">44. 📊 Dividend Yield</option>
        <option value="44">45. 💹 Earnings Per Share</option>
        <option value="45">46. 📈 Price to Earnings</option>
    </select>

    <!-- Tool Container -->
    <div id="toolContainer"></div>

    <!-- Reactions (7 Emojis) -->
    <div class="reactions">
        <h3>Rate this tool:</h3>
        <div class="reactionRow">
            <button class="reaction" data-r="like">👍 <span id="likeCount">0</span></button>
            <button class="reaction" data-r="love">❤️ <span id="loveCount">0</span></button>
            <button class="reaction" data-r="wow">😮 <span id="wowCount">0</span></button>
            <button class="reaction" data-r="sad">😢 <span id="sadCount">0</span></button>
            <button class="reaction" data-r="angry">😠 <span id="angryCount">0</span></button>
            <button class="reaction" data-r="laugh">😂 <span id="laughCount">0</span></button>
            <button class="reaction" data-r="celebrate">🎉 <span id="celebrateCount">0</span></button>
        </div>
    </div>

    <!-- Social Share -->
    <div class="social">
        <h3>Share:</h3>
        <div class="socialRow">
            <button class="shareBtn" data-s="fb">📘</button>
            <button class="shareBtn" data-s="tw">🐦</button>
            <button class="shareBtn" data-s="wa">💬</button>
            <button class="shareBtn" data-s="li">🔗</button>
            <button id="copyUrl">📋 Copy Link</button>
        </div>
    </div>

    <!-- History -->
    <div class="history">
        <h3>History <button id="clearHistory">Clear</button> <button id="exportCSV">Export</button></h3>
        <input type="text" id="searchHistory" placeholder="Search...">
        <div id="historyList"></div>
    </div>

    <!-- Scroll Buttons -->
    <button id="scrollUp" class="scroll up">⬆️</button>
    <button id="scrollDown" class="scroll down">⬇️</button>
</div>

<script src="advanced-percentage-calculator.js"></script>
</body>
</html>
