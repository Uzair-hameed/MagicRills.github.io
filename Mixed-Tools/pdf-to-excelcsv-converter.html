<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PDF to Excel/CSV Converter - Magicrills</title>
    <link rel="stylesheet" href="pdf-to-excelcsv-converter.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.12.313/pdf.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <i class="fas fa-file-pdf"></i>
            <h1>PDF to Excel/CSV Converter</h1>
            <p>Convert PDF tables to Excel, CSV, JSON & more</p>
            <div class="usage-counter">
                <i class="fas fa-chart-line"></i>
                <span id="usedCount">0</span> times used
            </div>
        </div>

        <!-- Scroll Buttons -->
        <div class="scroll-buttons">
            <button class="scroll-btn up" id="scrollUpBtn"><i class="fas fa-arrow-up"></i></button>
            <button class="scroll-btn down" id="scrollDownBtn"><i class="fas fa-arrow-down"></i></button>
        </div>

        <div class="dashboard">
            <div class="row">
                <!-- Left Column -->
                <div class="col-lg-6">
                    <!-- File Upload Card -->
                    <div class="card">
                        <div class="card-title"><i class="fas fa-cloud-upload-alt"></i> Upload PDF File</div>
                        <div class="drop-area" id="dropArea">
                            <i class="fas fa-file-pdf"></i>
                            <p>Drag & Drop your PDF file here</p>
                            <p class="small-text">or</p>
                            <button class="upload-btn" id="uploadBtn"><i class="fas fa-folder-open"></i> Browse Files</button>
                            <input type="file" id="fileInput" class="file-input" accept=".pdf" multiple>
                        </div>
                        <div id="fileList" class="file-list"></div>
                    </div>

                    <!-- Conversion Settings -->
                    <div class="card">
                        <div class="card-title"><i class="fas fa-cog"></i> Conversion Settings</div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label><i class="fas fa-file-alt"></i> Output Format</label>
                                <select id="outputFormat" class="form-control">
                                    <option value="xlsx">Excel (.xlsx)</option>
                                    <option value="csv">CSV (.csv)</option>
                                    <option value="json">JSON (.json)</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-columns"></i> CSV Delimiter</label>
                                <select id="csvDelimiter" class="form-control">
                                    <option value=",">Comma (,)</option>
                                    <option value=";">Semicolon (;)</option>
                                    <option value="|">Pipe (|)</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label><i class="fas fa-layer-group"></i> Page Range</label>
                                <input type="text" id="pageRange" class="form-control" placeholder="e.g., 1,3-5">
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-sheet-plastic"></i> Sheet Name</label>
                                <input type="text" id="sheetName" class="form-control" value="Converted Data">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label><i class="fas fa-filter"></i> Filter Data</label>
                                <input type="text" id="filterText" class="form-control" placeholder="Filter rows containing...">
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-search"></i> Find & Replace</label>
                                <input type="text" id="findText" class="form-control" placeholder="Find text">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <input type="text" id="replaceText" class="form-control" placeholder="Replace with">
                            </div>
                            <div class="form-group">
                                <button id="applyReplaceBtn" class="btn btn-sm btn-secondary">Apply</button>
                            </div>
                        </div>

                        <div class="checkbox-group">
                            <label><input type="checkbox" id="removeEmptyRows"> Remove empty rows</label>
                            <label><input type="checkbox" id="addHeaders"> Add column headers</label>
                        </div>

                        <button id="convertBtn" class="btn btn-primary btn-block" disabled>
                            <i class="fas fa-sync-alt"></i> Convert PDF
                        </button>
                    </div>
                </div>

                <!-- Right Column -->
                <div class="col-lg-6">
                    <!-- Progress -->
                    <div class="card">
                        <div class="card-title"><i class="fas fa-chart-line"></i> Conversion Progress</div>
                        <div class="progress-container">
                            <div class="progress-bar" id="progressBar"></div>
                        </div>
                        <div class="status" id="status"></div>
                        <div class="spinner" id="spinner"></div>
                    </div>

                    <!-- Preview -->
                    <div class="card" id="previewCard" style="display: none;">
                        <div class="card-title"><i class="fas fa-eye"></i> Data Preview</div>
                        <div class="preview-container" id="previewContainer"></div>
                        <div class="preview-stats" id="previewStats"></div>
                    </div>

                    <!-- Download -->
                    <div class="card" id="downloadCard" style="display: none;">
                        <div class="card-title"><i class="fas fa-download"></i> Download</div>
                        <div class="download-buttons" id="downloadButtons"></div>
                    </div>

                    <!-- History -->
                    <div class="card">
                        <div class="card-title"><i class="fas fa-history"></i> Recent Conversions</div>
                        <div id="fileHistory" class="file-history"></div>
                        <button id="clearHistoryBtn" class="btn btn-sm btn-danger">Clear History</button>
                    </div>

                    <!-- Reactions -->
                    <div class="card">
                        <div class="card-title"><i class="fas fa-smile"></i> Was this tool helpful?</div>
                        <div class="reactions-container" id="reactionsContainer">
                            <button class="reaction-btn" data-emoji="like"><i class="far fa-thumbs-up"></i><span id="likeCount">0</span></button>
                            <button class="reaction-btn" data-emoji="love"><i class="far fa-heart"></i><span id="loveCount">0</span></button>
                            <button class="reaction-btn" data-emoji="wow"><i class="far fa-surprise"></i><span id="wowCount">0</span></button>
                            <button class="reaction-btn" data-emoji="sad"><i class="far fa-frown"></i><span id="sadCount">0</span></button>
                            <button class="reaction-btn" data-emoji="angry"><i class="far fa-angry"></i><span id="angryCount">0</span></button>
                            <button class="reaction-btn" data-emoji="laugh"><i class="far fa-laugh-squint"></i><span id="laughCount">0</span></button>
                            <button class="reaction-btn" data-emoji="celebrate"><i class="fas fa-party-horn"></i><span id="celebrateCount">0</span></button>
                        </div>
                    </div>

                    <!-- Social Share -->
                    <div class="card">
                        <div class="card-title"><i class="fas fa-share-alt"></i> Share</div>
                        <div class="share-buttons">
                            <button class="share-btn facebook"><i class="fab fa-facebook-f"></i></button>
                            <button class="share-btn twitter"><i class="fab fa-twitter"></i></button>
                            <button class="share-btn whatsapp"><i class="fab fa-whatsapp"></i></button>
                            <button class="share-btn copy-link"><i class="fas fa-link"></i></button>
                        </div>
                        <div class="share-stats"><span id="shareCount">0</span> shares</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="pdf-to-excelcsv-converter.js"></script>
</body>
</html>
