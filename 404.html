<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Magicrills</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #05070a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .container { padding: 2rem; max-width: 600px; }
        .error-code { font-size: 8rem; font-weight: 900; background: linear-gradient(135deg, #00d4ff, #ff2d75); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .error-title { font-size: 2rem; font-weight: 700; margin: 1rem 0; }
        .error-desc { color: #8a9bb5; font-size: 1.1rem; line-height: 1.7; margin-bottom: 2rem; }
        .btn {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.8rem 2rem; border-radius: 60px;
            background: linear-gradient(135deg, #00d4ff, #b44aff);
            color: white; text-decoration: none; font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 40px rgba(0,212,255,0.15); }
        .home-link { color: #00d4ff; text-decoration: none; margin-top: 1rem; display: inline-block; }
        .home-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">404</div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-desc">Oops! The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
        <a href="/" class="btn"><i class="fas fa-home"></i> Back to Home</a>
        <br>
        <a href="/category-pages/administrator.html" class="home-link"><i class="fas fa-arrow-right"></i> Explore Tools</a>
    </div>
</body>
</html>
