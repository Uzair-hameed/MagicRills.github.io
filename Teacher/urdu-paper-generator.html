<!DOCTYPE html>
<html dir="rtl" lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>اردو پیپر جنریٹر - پروفیشنل ٹول</title>
    <link rel="stylesheet" href="urdu-paper-generator.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>
    <!-- Logo Upload Section -->
    <div class="logo-container">
        <div class="logo-wrapper" id="logoWrapper" onclick="document.getElementById('logoUpload').click()">
            <img id="schoolLogo" src="https://cdn-icons-png.flaticon.com/128/15120/15120883.png" alt="Logo">
            <div class="logo-overlay">📷 اپ لوڈ کریں</div>
        </div>
        <input type="file" id="logoUpload" accept="image/*" style="display:none" onchange="uploadLogo(event)">
        <button class="remove-logo-btn" onclick="removeLogo()" id="removeLogoBtn" style="display:none">✖ ہٹائیں</button>
    </div>

    <!-- Hero Section (Smaller) -->
    <section class="hero">
        <div class="hero-content">
            <h1 class="hero-title">📝 اردو پیپر جنریٹر</h1>
            <p class="hero-subtitle">پیشہ ورانہ امتحانی پرچے تیار کریں۔ AI کی مدد سے</p>
            <button class="hero-cta" onclick="scrollToMain()">🚀 شروع کریں</button>
        </div>
    </section>

    <!-- Theme Toggle -->
    <button class="theme-toggle" id="themeToggle">🌙</button>

    <!-- Scroll Buttons -->
    <button class="scroll-btn scroll-up" id="scrollUp">↑</button>
    <button class="scroll-btn scroll-down" id="scrollDown">↓</button>

    <div class="container" id="mainContainer">
        <!-- Usage & Reactions -->
        <div class="stats-bar">
            <div class="usage-card">
                <span>📊 استعمال:</span>
                <span id="toolUsageCount">0</span>
            </div>
            <div class="reactions-bar">
                <button class="reaction-btn" data-reaction="like">👍 <span id="likeCount">0</span></button>
                <button class="reaction-btn" data-reaction="love">❤️ <span id="loveCount">0</span></button>
                <button class="reaction-btn" data-reaction="wow">😮 <span id="wowCount">0</span></button>
                <button class="reaction-btn" data-reaction="sad">😢 <span id="sadCount">0</span></button>
                <button class="reaction-btn" data-reaction="angry">😠 <span id="angryCount">0</span></button>
                <button class="reaction-btn" data-reaction="laugh">😂 <span id="laughCount">0</span></button>
                <button class="reaction-btn" data-reaction="celebrate">🎉 <span id="celebrateCount">0</span></button>
            </div>
        </div>

        <!-- Share Buttons -->
        <div class="share-section">
            <div class="share-buttons">
                <button class="share-btn fb" onclick="shareOnFacebook()">📘 Facebook</button>
                <button class="share-btn tw" onclick="shareOnTwitter()">🐦 Twitter</button>
                <button class="share-btn wa" onclick="shareOnWhatsApp()">💚 WhatsApp</button>
                <button class="share-btn li" onclick="shareOnLinkedIn()">🔗 LinkedIn</button>
                <button class="share-btn copy" onclick="copyPageURL()">🔗 کاپی لنک</button>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tab-container">
            <button class="tab-btn active" data-tab="setup">🏠 سیٹ اپ</button>
            <button class="tab-btn" data-tab="objective">📝 معروضی</button>
            <button class="tab-btn" data-tab="subjective">✍️ انشائیہ</button>
            <button class="tab-btn" data-tab="preview">👁️ پیش نظارہ</button>
            <button class="tab-btn" data-tab="analysis">📊 تجزیہ</button>
            <button class="tab-btn" data-tab="saved">💾 محفوظ</button>
        </div>

        <!-- Setup Tab -->
        <div class="tab-content active" id="setupTab">
            <div class="card">
                <h2>بنیادی معلومات</h2>
                <div class="form-row">
                    <div class="form-group"><label>سکول کا نام</label><input type="text" id="schoolName" placeholder="سکول کا نام"></div>
                    <div class="form-group"><label>پرچے کا عنوان</label><input type="text" id="paperTitle" placeholder="پرچے کا عنوان"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>ٹرم</label><select id="term"><option>پہلا</option><option>دوسرا</option><option>سالانہ</option></select></div>
                    <div class="form-group"><label>مضمون</label><input type="text" id="subject" placeholder="مضمون"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>کل نمبر</label><input type="number" id="totalMarks" placeholder="کل نمبر"></div>
                    <div class="form-group"><label>وقت</label><input type="text" id="time" placeholder="مثال: 2 گھنٹے"></div>
                </div>
                <div class="form-group"><label>ہدایات</label><textarea id="instructions" rows="3" placeholder="پرچے کی ہدایات"></textarea></div>
                <div class="form-group"><label>AI سے سوالات</label>
                    <div class="ai-row"><input type="text" id="aiTopic" placeholder="موضوع"><select id="aiQuestionType"><option value="mcq">MCQ</option><option value="short">مختصر</option></select><button class="btn-ai" onclick="generateAIQuestions()">✨ AI بنائیں</button></div>
                </div>
            </div>
        </div>

        <!-- Objective Tab -->
        <div class="tab-content" id="objectiveTab">
            <div class="card">
                <h2>معروضی سوالات</h2>
                <select id="objectiveTypeSelect" class="question-type-select">
                    <option value="mcq">📌 MCQ (چند انتخابی)</option>
                    <option value="fillblank">⬜ خالی جگہ</option>
                    <option value="matching">🔗 میچنگ کالم</option>
                    <option value="problematic">⚠️ مشکل/مسئلہ پر مبنی MCQ</option>
                    <option value="scenario">🎭 منظرنامہ پر مبنی MCQ</option>
                </select>
                <button class="btn-primary" onclick="addObjectiveQuestion()">+ سوال شامل کریں</button>
                <div id="objectiveQuestionsContainer" class="questions-container"></div>
            </div>
        </div>

        <!-- Subjective Tab -->
        <div class="tab-content" id="subjectiveTab">
            <div class="card">
                <h2>انشائیہ سوالات</h2>
                <select id="subjectiveTypeSelect" class="question-type-select">
                    <option value="crq">📝 CRQ (مختصر جوابی)</option>
                    <option value="erq">📄 ERQ (طویل جوابی)</option>
                    <option value="case">🏥 کیس اسٹڈی</option>
                    <option value="scenario_crq">🎭 منظرنامہ پر مبنی CRQ</option>
                    <option value="problematic_long">⚠️ مسئلہ پر مبنی سوال</option>
                    <option value="labelling">🏷️ لیبلنگ ڈایاگرام</option>
                </select>
                <button class="btn-primary" onclick="addSubjectiveQuestion()">+ سوال شامل کریں</button>
                <div id="subjectiveQuestionsContainer" class="questions-container"></div>
            </div>
        </div>

        <!-- Preview Tab -->
        <div class="tab-content" id="previewTab">
            <div class="card">
                <h2>پرچے کا پیش نظارہ</h2>
                <div class="export-buttons">
                    <button class="btn-success" onclick="exportToPDF()">📄 PDF</button>
                    <button class="btn-success" onclick="exportToDOC()">📝 DOC</button>
                    <button class="btn-success" onclick="exportToTXT()">📃 TXT</button>
                    <button class="btn-primary" onclick="saveToDatabase()">☁️ محفوظ کریں</button>
                    <button class="btn-primary" onclick="printPaper()">🖨️ پرنٹ</button>
                    <button class="btn-warning" onclick="generateMarkingKey()">🔑 مارکنگ کلید بنائیں</button>
                </div>
                <div class="paper-preview" id="paperPreview"></div>
                <div class="teacher-signature">
                    <label>اساتذہ کے دستخط:</label>
                    <input type="text" id="teacherSignature" placeholder="استاد کا نام اور دستخط">
                    <div class="signature-line"></div>
                </div>
            </div>
        </div>

        <!-- Analysis Tab -->
        <div class="tab-content" id="analysisTab">
            <div class="card">
                <h2>📊 تجزیاتی رپورٹ</h2>
                <div class="analysis-stats" id="analysisStats"></div>
                <div class="charts-container">
                    <canvas id="questionsChart"></canvas>
                    <canvas id="marksChart"></canvas>
                </div>
                <div id="marksBreakdown"></div>
            </div>
        </div>

        <!-- Saved Tab -->
        <div class="tab-content" id="savedTab">
            <div class="card">
                <h2>💾 محفوظ شدہ پرچے</h2>
                <div id="savedDesignsList"></div>
                <button class="btn-primary" onclick="loadSavedDesigns()">🔄 ریفریش</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    <div id="loadingModal" class="modal"><div class="modal-content"><div class="spinner"></div><p>AI جنریٹ ہو رہا ہے...</p></div></div>

    <script src="urdu-paper-generator.js"></script>
</body>
</html>
