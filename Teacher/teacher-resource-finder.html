<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PosterForge Pro - Poster Designer</title>
    
    <!-- Fabric.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            overflow: hidden;
        }
        
        /* App Layout */
        .app {
            display: flex;
            height: 100vh;
            width: 100%;
        }
        
        /* Sidebar */
        .sidebar {
            width: 280px;
            background: white;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }
        
        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #e2e8f0;
            font-weight: bold;
            font-size: 18px;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* Tabs */
        .tabs {
            display: flex;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .tab-btn {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: #64748b;
            transition: all 0.2s;
        }
        
        .tab-btn.active {
            color: #2563eb;
            border-bottom: 2px solid #2563eb;
        }
        
        /* Tab Content */
        .tab-content {
            display: none;
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        
        .tab-content.active {
            display: block;
        }
        
        /* Templates Grid */
        .templates-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .template-card {
            background: #f8fafc;
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        
        .template-card:hover {
            border-color: #2563eb;
            transform: translateY(-2px);
        }
        
        .template-icon {
            font-size: 32px;
            margin-bottom: 8px;
            color: #2563eb;
        }
        
        .template-name {
            font-size: 12px;
            font-weight: 500;
        }
        
        /* Elements Grid */
        .elements-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        
        .element-card {
            background: #f8fafc;
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #e2e8f0;
        }
        
        .element-card:hover {
            background: #2563eb;
            color: white;
        }
        
        .element-card i {
            font-size: 24px;
            margin-bottom: 6px;
            display: block;
        }
        
        .element-card span {
            font-size: 11px;
        }
        
        /* Text Panel */
        .panel-section {
            margin-bottom: 20px;
        }
        
        .panel-section label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
        }
        
        .panel-section input, .panel-section select, .panel-section textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .btn-primary {
            width: 100%;
            padding: 10px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            margin-top: 8px;
        }
        
        .btn-secondary {
            width: 100%;
            padding: 10px;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 8px;
        }
        
        /* Toolbar */
        .toolbar {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            flex-wrap: wrap;
        }
        
        .tool-btn {
            padding: 8px 12px;
            background: #f1f5f9;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        
        .tool-btn:hover {
            background: #2563eb;
            color: white;
        }
        
        /* Canvas */
        .canvas-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .canvas-container {
            flex: 1;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #e2e8f0;
            padding: 20px;
        }
        
        #canvas {
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            background: white;
            cursor: crosshair;
        }
        
        /* Bottom Bar */
        .bottom-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px;
            background: white;
            border-top: 1px solid #e2e8f0;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .reactions {
            display: flex;
            gap: 8px;
        }
        
        .reaction-btn {
            padding: 6px 12px;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
        }
        
        .share-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: none;
            background: #f1f5f9;
            cursor: pointer;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1e293b;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 1000;
            transform: translateX(400px);
            transition: transform 0.3s;
        }
        
        .toast.show {
            transform: translateX(0);
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 20px;
            color: #64748b;
        }
    </style>
</head>
<body>

<div class="app">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-magic"></i> PosterForge Pro
        </div>
        
        <div class="tabs">
            <button class="tab-btn active" data-tab="templates">Templates</button>
            <button class="tab-btn" data-tab="elements">Elements</button>
            <button class="tab-btn" data-tab="text">Text</button>
        </div>
        
        <!-- Templates Tab -->
        <div class="tab-content active" id="templates-tab">
            <div class="templates-grid" id="templatesGrid">
                <div class="loading">Loading templates...</div>
            </div>
        </div>
        
        <!-- Elements Tab -->
        <div class="tab-content" id="elements-tab">
            <div class="elements-grid" id="elementsGrid"></div>
        </div>
        
        <!-- Text Tab -->
        <div class="tab-content" id="text-tab">
            <div class="panel-section">
                <label>Add Text</label>
                <textarea id="textInput" rows="3" placeholder="Enter your text..."></textarea>
                <button class="btn-primary" id="addTextBtn">+ Add to Canvas</button>
            </div>
            
            <div class="panel-section">
                <label>Font</label>
                <select id="fontSelect">
                    <option value="Arial">Arial</option>
                    <option value="Times New Roman">Times New Roman</option>
                    <option value="Georgia">Georgia</option>
                    <option value="Verdana">Verdana</option>
                </select>
            </div>
            
            <div class="panel-section">
                <label>Size: <span id="sizeVal">32</span>px</label>
                <input type="range" id="fontSize" min="10" max="100" value="32">
            </div>
            
            <div class="panel-section">
                <label>Color</label>
                <input type="color" id="textColor" value="#1e293b">
            </div>
            
            <div class="panel-section">
                <button class="btn-secondary" id="boldBtn"><b>Bold</b></button>
                <button class="btn-secondary" id="italicBtn"><i>Italic</i></button>
            </div>
        </div>
    </div>
    
    <!-- Canvas Area -->
    <div class="canvas-area">
        <div class="toolbar">
            <button class="tool-btn" id="undoBtn"><i class="fas fa-undo"></i> Undo</button>
            <button class="tool-btn" id="redoBtn"><i class="fas fa-redo"></i> Redo</button>
            <button class="tool-btn" id="deleteBtn"><i class="fas fa-trash"></i> Delete</button>
            <button class="tool-btn" id="exportBtn"><i class="fas fa-download"></i> PNG</button>
        </div>
        
        <div class="canvas-container">
            <canvas id="canvas" width="800" height="1000"></canvas>
        </div>
    </div>
    
    <!-- Bottom Bar -->
    <div class="bottom-bar">
        <div><i class="fas fa-chart-line"></i> <span id="usageCount">0</span> uses</div>
        <div class="reactions">
            <button class="reaction-btn" data-reaction="like">👍 <span id="likeCount">0</span></button>
            <button class="reaction-btn" data-reaction="love">❤️ <span id="loveCount">0</span></button>
            <button class="reaction-btn" data-reaction="wow">😮 <span id="wowCount">0</span></button>
        </div>
        <div>
            <button class="share-btn" data-platform="facebook"><i class="fab fa-facebook-f"></i></button>
            <button class="share-btn" data-platform="copy"><i class="fas fa-link"></i></button>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
// ========================================
// SIMPLE, FAST, WORKING POSTER GENERATOR
// ========================================

let canvas = null;
let userId = localStorage.getItem('userId') || 'user_' + Date.now();
let historyStates = [];
let historyIndex = -1;
const API_BASE = '/api';

// Templates from your /templates/ folder
const TEMPLATE_BASE = '/templates/';
const TEMPLATE_COUNT = 111;

// Initialize canvas
function initCanvas() {
    canvas = new fabric.Canvas('canvas', {
        width: 800,
        height: 1000,
        backgroundColor: '#ffffff'
    });
    
    // Add welcome message
    const welcome = new fabric.Text('Welcome to PosterForge Pro!\n\nClick on templates or elements to start!\nDrag to move | Click to select', {
        left: 400, top: 450, fontSize: 20, fill: '#666', textAlign: 'center', originX: 'center'
    });
    canvas.add(welcome);
    canvas.renderAll();
    
    // Save to history on changes
    canvas.on('object:added', () => saveHistory());
    canvas.on('object:modified', () => saveHistory());
    canvas.on('object:removed', () => saveHistory());
    
    saveHistory();
}

// Save history
function saveHistory() {
    const state = JSON.stringify(canvas.toJSON());
    if (historyIndex < historyStates.length - 1) {
        historyStates = historyStates.slice(0, historyIndex + 1);
    }
    historyStates.push(state);
    historyIndex = historyStates.length - 1;
    if (historyStates.length > 50) historyStates.shift();
}

function undo() {
    if (historyIndex > 0) {
        historyIndex--;
        canvas.loadFromJSON(JSON.parse(historyStates[historyIndex]), () => canvas.renderAll());
        showToast('Undo');
    }
}

function redo() {
    if (historyIndex < historyStates.length - 1) {
        historyIndex++;
        canvas.loadFromJSON(JSON.parse(historyStates[historyIndex]), () => canvas.renderAll());
        showToast('Redo');
    }
}

// Load templates from your /templates/ folder
async function loadTemplates() {
    const grid = document.getElementById('templatesGrid');
    grid.innerHTML = '<div class="loading">Loading templates...</div>';
    let loaded = 0;
    
    for (let i = 1; i <= TEMPLATE_COUNT; i++) {
        if (i === 36) continue; // skip invalid
        
        try {
            const response = await fetch(`${TEMPLATE_BASE}template${i}.json`);
            if (!response.ok) continue;
            
            const data = await response.json();
            
            const card = document.createElement('div');
            card.className = 'template-card';
            card.innerHTML = `
                <div class="template-icon"><i class="fas fa-palette"></i></div>
                <div class="template-name">Template ${i}</div>
            `;
            
            card.onclick = () => {
                showToast(`Loading template ${i}...`);
                try {
                    canvas.clear();
                    canvas.backgroundColor = '#ffffff';
                    
                    let loadData = data;
                    if (Array.isArray(data) && data[0] && data[0].objects) {
                        loadData = data[0];
                    }
                    
                    canvas.loadFromJSON(loadData, () => {
                        canvas.renderAll();
                        saveHistory();
                        showToast(`Template ${i} loaded!`);
                    });
                } catch(e) {
                    showToast(`Error loading template ${i}`);
                }
            };
            
            grid.appendChild(card);
            loaded++;
        } catch(e) {}
    }
    
    if (loaded === 0) {
        grid.innerHTML = '<div class="loading">No templates found. Add JSON files to /templates/ folder</div>';
    } else {
        console.log(`${loaded} templates loaded`);
    }
}

// Load elements (shapes + stickers)
function loadElements() {
    const shapes = [
        { name: 'Square', icon: 'fa-square', type: 'rect', w: 80, h: 80 },
        { name: 'Circle', icon: 'fa-circle', type: 'circle', r: 40 },
        { name: 'Triangle', icon: 'fa-triangle', type: 'triangle', w: 80, h: 80 },
        { name: 'Star', icon: 'fa-star', type: 'star' },
        { name: 'Heart', icon: 'fa-heart', type: 'heart' }
    ];
    
    const stickers = ['⭐', '❤️', '🔥', '👑', '🌟', '💎', '🎈', '🎉', '🏆', '🌈'];
    
    const grid = document.getElementById('elementsGrid');
    grid.innerHTML = '';
    
    // Add shapes
    shapes.forEach(s => {
        const card = document.createElement('div');
        card.className = 'element-card';
        card.innerHTML = `<i class="fas ${s.icon}"></i><span>${s.name}</span>`;
        card.onclick = () => addShape(s);
        grid.appendChild(card);
    });
    
    // Add stickers
    stickers.forEach(s => {
        const card = document.createElement('div');
        card.className = 'element-card';
        card.innerHTML = `<span style="font-size: 28px;">${s}</span><span>Sticker</span>`;
        card.onclick = () => addSticker(s);
        grid.appendChild(card);
    });
}

function addShape(s) {
    let obj;
    const left = Math.random() * (canvas.width - 200) + 100;
    const top = Math.random() * (canvas.height - 200) + 100;
    
    if (s.type === 'rect') {
        obj = new fabric.Rect({ left, top, width: s.w, height: s.h, fill: '#2563eb' });
    } else if (s.type === 'circle') {
        obj = new fabric.Circle({ left, top, radius: s.r, fill: '#2563eb' });
    } else if (s.type === 'triangle') {
        obj = new fabric.Triangle({ left, top, width: s.w, height: s.h, fill: '#2563eb' });
    } else if (s.type === 'star') {
        const points = [];
        for (let i = 0; i < 10; i++) {
            const angle = (i * 36 - 90) * Math.PI / 180;
            const r = i % 2 === 0 ? 40 : 20;
            points.push({ x: Math.cos(angle) * r, y: Math.sin(angle) * r });
        }
        obj = new fabric.Polygon(points, { left, top, fill: '#f59e0b' });
    } else {
        obj = new fabric.Path('M 0,-30 C 20,-50 50,-20 0,30 C -50,-20 -20,-50 0,-30 Z', { left, top, fill: '#ef4444', scaleX: 0.8, scaleY: 0.8 });
    }
    
    canvas.add(obj);
    canvas.setActiveObject(obj);
    canvas.renderAll();
    saveHistory();
    showToast(`Added ${s.name}`);
}

function addSticker(sticker) {
    const text = new fabric.Text(sticker, {
        left: canvas.width / 2 - 30,
        top: canvas.height / 2 - 30,
        fontSize: 48,
        fontFamily: 'Segoe UI Emoji'
    });
    canvas.add(text);
    canvas.setActiveObject(text);
    canvas.renderAll();
    saveHistory();
    showToast('Sticker added');
}

// Text functions
document.getElementById('addTextBtn')?.addEventListener('click', () => {
    const val = document.getElementById('textInput')?.value || 'Your Text';
    if (!val.trim()) return;
    
    const text = new fabric.Text(val, {
        left: canvas.width / 2,
        top: canvas.height / 2,
        fontSize: parseInt(document.getElementById('fontSize')?.value) || 32,
        fontFamily: document.getElementById('fontSelect')?.value || 'Arial',
        fill: document.getElementById('textColor')?.value || '#1e293b',
        originX: 'center',
        originY: 'center'
    });
    canvas.add(text);
    canvas.setActiveObject(text);
    canvas.renderAll();
    saveHistory();
    showToast('Text added');
});

function updateSelectedText() {
    const obj = canvas.getActiveObject();
    if (obj && obj.type === 'text') {
        obj.set({
            fontFamily: document.getElementById('fontSelect')?.value,
            fontSize: parseInt(document.getElementById('fontSize')?.value),
            fill: document.getElementById('textColor')?.value
        });
        canvas.renderAll();
        saveHistory();
    }
}

document.getElementById('fontSelect')?.addEventListener('change', updateSelectedText);
document.getElementById('fontSize')?.addEventListener('input', (e) => {
    document.getElementById('sizeVal').innerText = e.target.value;
    updateSelectedText();
});
document.getElementById('textColor')?.addEventListener('input', updateSelectedText);

document.getElementById('boldBtn')?.addEventListener('click', () => {
    const obj = canvas.getActiveObject();
    if (obj && obj.type === 'text') {
        obj.set('fontWeight', obj.fontWeight === 'bold' ? 'normal' : 'bold');
        canvas.renderAll();
    }
});

// Delete selected element
document.getElementById('deleteBtn')?.addEventListener('click', () => {
    const obj = canvas.getActiveObject();
    if (obj) {
        canvas.remove(obj);
        canvas.renderAll();
        saveHistory();
        showToast('Deleted');
    }
});

// Export as PNG
async function exportPNG() {
    try {
        const dataURL = canvas.toDataURL({ format: 'png', multiplier: 2 });
        const link = document.createElement('a');
        link.download = 'poster.png';
        link.href = dataURL;
        link.click();
        showToast('PNG downloaded!');
    } catch(e) {
        showToast('Export failed');
    }
}

document.getElementById('exportBtn')?.addEventListener('click', exportPNG);
document.getElementById('undoBtn')?.addEventListener('click', undo);
document.getElementById('redoBtn')?.addEventListener('click', redo);

// Tab switching
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        const tab = btn.dataset.tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`${tab}-tab`).classList.add('active');
    });
});

// Reactions
async function addReaction(type) {
    try {
        await fetch(`${API_BASE}/add-reaction`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ tool_slug: 'teacher-resource-finder', emoji: type === 'like' ? '👍' : type === 'love' ? '❤️' : '😮', user_id: userId })
        });
        showToast('Thanks for your reaction!');
    } catch(e) {}
}

document.querySelectorAll('.reaction-btn').forEach(btn => {
    btn.addEventListener('click', () => addReaction(btn.dataset.reaction));
});

// Share
function share(platform) {
    const url = window.location.href;
    if (platform === 'facebook') window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`, '_blank');
    else if (platform === 'copy') { navigator.clipboard.writeText(url); showToast('Link copied!'); }
}

document.querySelectorAll('.share-btn').forEach(btn => {
    btn.addEventListener('click', () => share(btn.dataset.platform));
});

// Track usage
async function trackUsage() {
    try {
        await fetch(`${API_BASE}/increment-usage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ tool_slug: 'teacher-resource-finder', user_id: userId })
        });
    } catch(e) {}
}

function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.innerText = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
}

// Initialize everything
async function init() {
    initCanvas();
    await loadTemplates();
    loadElements();
    trackUsage();
    showToast('PosterForge Pro Ready!');
}

init();

// Make canvas elements selectable on click
document.getElementById('canvas').addEventListener('click', (e) => {
    if (e.target === document.getElementById('canvas')) {
        canvas.discardActiveObject();
        canvas.renderAll();
    }
});
</script>
</body>
</html>
