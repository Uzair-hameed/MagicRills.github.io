<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PosterForge Pro - Professional Poster Designer</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome 6 (8,000+ Icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Fabric.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
    
    <!-- html2canvas + jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <!-- FileSaver.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="teacher-resource-finder.css">
</head>
<body>

<div class="app">
    <!-- CANVA-STYLE SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <i class="fas fa-magic"></i>
                <span>PosterForge Pro</span>
            </div>
            <button class="close-sidebar" id="closeSidebarBtn">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <!-- Sidebar Navigation Tabs -->
        <div class="sidebar-nav">
            <button class="nav-btn active" data-nav="templates">
                <i class="fas fa-layer-group"></i>
                <span>Templates</span>
            </button>
            <button class="nav-btn" data-nav="elements">
                <i class="fas fa-shapes"></i>
                <span>Elements</span>
            </button>
            <button class="nav-btn" data-nav="text">
                <i class="fas fa-font"></i>
                <span>Text</span>
            </button>
            <button class="nav-btn" data-nav="background">
                <i class="fas fa-image"></i>
                <span>Background</span>
            </button>
            <button class="nav-btn" data-nav="upload">
                <i class="fas fa-upload"></i>
                <span>Upload</span>
            </button>
            <button class="nav-btn" data-nav="ai">
                <i class="fas fa-robot"></i>
                <span>AI</span>
            </button>
        </div>
        
        <!-- TEMPLATES PANEL -->
        <div class="nav-panel active" id="templates-panel">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="templateSearch" placeholder="Search templates...">
            </div>
            <div class="categories">
                <button class="cat-btn active" data-template-cat="all">All</button>
                <button class="cat-btn" data-template-cat="custom">My Templates</button>
            </div>
            <div class="templates-grid" id="templatesGrid"></div>
        </div>
        
        <!-- ELEMENTS PANEL -->
        <div class="nav-panel" id="elements-panel">
            <div class="elements-subnav">
                <button class="subnav-btn active" data-elem-type="shapes">Shapes</button>
                <button class="subnav-btn" data-elem-type="icons">Icons</button>
                <button class="subnav-btn" data-elem-type="stickers">Stickers</button>
                <button class="subnav-btn" data-elem-type="frames">Frames</button>
            </div>
            <div class="elements-grid" id="elementsGrid"></div>
            <div class="stickers-grid" id="stickersGrid"></div>
        </div>
        
        <!-- TEXT PANEL (Complete Customization) -->
        <div class="nav-panel" id="text-panel">
            <div class="panel-section">
                <label>Add Custom Text</label>
                <textarea id="customText" rows="3" placeholder="Enter your text here..."></textarea>
                <button class="btn-primary" id="addTextBtn">+ Add Text to Canvas</button>
            </div>
            
            <div class="panel-section">
                <label>Font Family</label>
                <select id="fontSelect">
                    <option value="Inter">Inter</option>
                    <option value="Arial">Arial</option>
                    <option value="Times New Roman">Times New Roman</option>
                    <option value="Georgia">Georgia</option>
                    <option value="Jameel Noori Nastaleeq">Jameel Noori Nastaleeq (Urdu)</option>
                    <option value="Playfair Display">Playfair Display</option>
                    <option value="Courier New">Courier New</option>
                </select>
            </div>
            
            <div class="panel-section">
                <label>Font Size: <span id="fontSizeVal">32</span>px</label>
                <input type="range" id="fontSize" min="10" max="200" value="32">
            </div>
            
            <div class="panel-section">
                <label>Text Color</label>
                <input type="color" id="textColor" value="#1e293b">
            </div>
            
            <div class="panel-section">
                <label>Text Effects</label>
                <div class="effect-buttons">
                    <button class="effect-btn" id="textBoldBtn"><b>Bold</b></button>
                    <button class="effect-btn" id="textItalicBtn"><i>Italic</i></button>
                    <button class="effect-btn" id="textUnderlineBtn"><u>Underline</u></button>
                    <button class="effect-btn" id="textShadowBtn">Shadow</button>
                </div>
            </div>
            
            <div class="panel-section">
                <label>Alignment</label>
                <div class="align-buttons">
                    <button class="align-btn" data-align="left"><i class="fas fa-align-left"></i></button>
                    <button class="align-btn" data-align="center"><i class="fas fa-align-center"></i></button>
                    <button class="align-btn" data-align="right"><i class="fas fa-align-right"></i></button>
                    <button class="align-btn" data-align="justify"><i class="fas fa-align-justify"></i></button>
                </div>
            </div>
            
            <div class="panel-section">
                <label>Letter Spacing</label>
                <input type="range" id="letterSpacing" min="-5" max="20" value="0">
                <span id="letterSpacingVal">0px</span>
            </div>
            
            <div class="panel-section">
                <label>Line Height</label>
                <input type="range" id="lineHeight" min="0.8" max="3" step="0.1" value="1.2">
                <span id="lineHeightVal">1.2</span>
            </div>
        </div>
        
        <!-- BACKGROUND PANEL -->
        <div class="nav-panel" id="background-panel">
            <div class="panel-section">
                <label>Solid Color</label>
                <input type="color" id="bgSolidColor" value="#ffffff">
                <button class="btn-secondary" id="applyColorBtn">Apply Color</button>
            </div>
            
            <div class="panel-section">
                <label>Gradients (50+)</label>
                <div class="gradients-grid" id="gradientsGrid"></div>
            </div>
            
            <div class="panel-section">
                <label>Background Image</label>
                <input type="file" id="bgImageUpload" accept="image/*">
                <button class="btn-secondary" id="applyImageBtn">Apply Image</button>
            </div>
            
            <div class="panel-section">
                <label>Patterns</label>
                <div class="patterns-grid" id="patternsGrid"></div>
            </div>
        </div>
        
        <!-- UPLOAD PANEL -->
        <div class="nav-panel" id="upload-panel">
            <div class="panel-section">
                <label>Upload Image to Canvas</label>
                <input type="file" id="imageUpload" accept="image/*">
                <button class="btn-primary" id="uploadImageBtn">Add to Canvas</button>
            </div>
            
            <div class="panel-section">
                <label>Upload & Edit Existing Poster</label>
                <input type="file" id="posterUpload" accept="image/*">
                <button class="btn-primary" id="editPosterBtn">Edit This Poster</button>
                <p class="note">Upload your own poster/image and customize it with our tools!</p>
            </div>
            
            <div class="panel-section">
                <label>My Uploaded Images</label>
                <div id="uploadedImagesList" class="uploaded-images"></div>
            </div>
        </div>
        
        <!-- AI PANEL (Grok API) -->
        <div class="nav-panel" id="ai-panel">
            <div class="panel-section">
                <label>AI Quote Generator</label>
                <input type="text" id="aiPrompt" placeholder="Enter topic (e.g., education, love, success)">
                <button class="btn-primary" id="generateQuoteBtn">
                    <i class="fas fa-robot"></i> Generate Quote
                </button>
            </div>
            
            <div class="panel-section">
                <label>AI Design Suggestions</label>
                <button class="btn-secondary" id="suggestColorsBtn">Suggest Colors</button>
                <button class="btn-secondary" id="suggestLayoutBtn">Suggest Layout</button>
            </div>
            
            <div class="panel-section">
                <label>Generated Quotes</label>
                <div id="generatedQuotesList" class="quotes-list"></div>
            </div>
        </div>
    </div>
    
    <!-- MAIN CANVAS AREA -->
    <div class="main-area">
        <!-- Top Toolbar -->
        <div class="top-toolbar">
            <button class="tool-btn" id="toggleSidebarBtn">
                <i class="fas fa-bars"></i>
            </button>
            
            <div class="divider"></div>
            
            <button class="tool-btn" id="undoBtn" title="Undo">
                <i class="fas fa-undo"></i> Undo
            </button>
            <button class="tool-btn" id="redoBtn" title="Redo">
                <i class="fas fa-redo"></i> Redo
            </button>
            <button class="tool-btn" id="deleteSelectedBtn" title="Delete">
                <i class="fas fa-trash"></i> Delete
            </button>
            
            <div class="divider"></div>
            
            <button class="tool-btn" id="bringForwardBtn" title="Bring Forward">
                <i class="fas fa-arrow-up"></i> Bring Forward
            </button>
            <button class="tool-btn" id="sendBackwardBtn" title="Send Backward">
                <i class="fas fa-arrow-down"></i> Send Backward
            </button>
            
            <div class="divider"></div>
            
            <div class="dropdown">
                <button class="tool-btn dropdown-btn">
                    <i class="fas fa-download"></i> Export <i class="fas fa-chevron-down"></i>
                </button>
                <div class="dropdown-menu">
                    <button id="exportPNG"><i class="fas fa-file-image"></i> PNG</button>
                    <button id="exportJPG"><i class="fas fa-file-image"></i> JPG</button>
                    <button id="exportPDF"><i class="fas fa-file-pdf"></i> PDF</button>
                    <button id="exportSVG"><i class="fas fa-file-code"></i> SVG</button>
                    <button id="exportJSON"><i class="fas fa-code"></i> JSON</button>
                </div>
            </div>
            
            <div class="dropdown">
                <button class="tool-btn dropdown-btn">
                    <i class="fas fa-save"></i> Save <i class="fas fa-chevron-down"></i>
                </button>
                <div class="dropdown-menu">
                    <button id="saveToTiDB"><i class="fas fa-cloud-upload-alt"></i> Save to Cloud</button>
                    <button id="saveToLocal"><i class="fas fa-database"></i> Save to Browser</button>
                    <button id="loadFromLocal"><i class="fas fa-folder-open"></i> Load from Browser</button>
                </div>
            </div>
            
            <div class="divider"></div>
            
            <button class="tool-btn" id="darkModeBtn">
                <i class="fas fa-moon"></i>
            </button>
        </div>
        
        <!-- Canvas Container -->
        <div class="canvas-container" id="canvasContainer">
            <canvas id="canvas" width="800" height="1000"></canvas>
        </div>
    </div>
    
    <!-- LAYERS PANEL (Right Side) -->
    <div class="layers-panel" id="layersPanel">
        <div class="layers-header">
            <span><i class="fas fa-layer-group"></i> Layers</span>
            <button id="toggleLayersBtn"><i class="fas fa-chevron-down"></i></button>
        </div>
        <div class="layers-list" id="layersList"></div>
    </div>
    
    <!-- BOTTOM BAR (Reactions + Share + Usage) -->
    <div class="bottom-bar">
        <div class="usage-stats">
            <i class="fas fa-chart-line"></i>
            <span id="usageCount">0</span> uses
        </div>
        <div class="reactions" id="reactionsContainer">
            <button class="reaction-btn" data-reaction="like">👍 <span id="likeCount">0</span></button>
            <button class="reaction-btn" data-reaction="love">❤️ <span id="loveCount">0</span></button>
            <button class="reaction-btn" data-reaction="wow">😮 <span id="wowCount">0</span></button>
            <button class="reaction-btn" data-reaction="sad">😢 <span id="sadCount">0</span></button>
            <button class="reaction-btn" data-reaction="laugh">😂 <span id="laughCount">0</span></button>
            <button class="reaction-btn" data-reaction="celebrate">🎉 <span id="celebrateCount">0</span></button>
        </div>
        <div class="share-buttons">
            <button class="share-btn" data-platform="facebook"><i class="fab fa-facebook-f"></i></button>
            <button class="share-btn" data-platform="twitter"><i class="fab fa-twitter"></i></button>
            <button class="share-btn" data-platform="whatsapp"><i class="fab fa-whatsapp"></i></button>
            <button class="share-btn" data-platform="linkedin"><i class="fab fa-linkedin-in"></i></button>
            <button class="share-btn" data-platform="copy"><i class="fas fa-link"></i></button>
        </div>
    </div>
</div>

<!-- Toast Notification -->
<div id="toast" class="toast"></div>

<!-- Loading Modal -->
<div id="loadingModal" class="modal">
    <div class="modal-content">
        <div class="spinner"></div>
        <p>Processing...</p>
    </div>
</div>

<script src="teacher-resource-finder.js"></script>
</body>
</html>
