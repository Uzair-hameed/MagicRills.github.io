<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ECCE Worksheet Maker - MagicRills</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="worksheet-maker-for-ecce-teachers.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div class="app">
        <!-- Header with Stats -->
        <div class="app-header">
            <div class="header-left">
                <i class="fas fa-chalkboard-teacher"></i>
                <h1>ECCE Worksheet Maker</h1>
            </div>
            <div class="header-stats">
                <div class="stat-badge">
                    <i class="fas fa-users"></i>
                    <span id="usageCount">0</span>
                    <small>Uses</small>
                </div>
                <div class="stat-badge">
                    <i class="fas fa-heart"></i>
                    <span id="totalReactions">0</span>
                    <small>Reactions</small>
                </div>
                <div class="stat-badge">
                    <i class="fas fa-share-alt"></i>
                    <span id="totalShares">0</span>
                    <small>Shares</small>
                </div>
            </div>
        </div>

        <!-- Ribbon Toolbar -->
        <div class="ribbon">
            <!-- File Tab -->
            <div class="ribbon-section">
                <div class="ribbon-group">
                    <button id="newBtn" class="ribbon-btn"><i class="fas fa-file"></i> New</button>
                    <button id="saveBtn" class="ribbon-btn"><i class="fas fa-save"></i> Save</button>
                    <button id="loadBtn" class="ribbon-btn"><i class="fas fa-folder-open"></i> Load</button>
                    <button id="sharePageBtn" class="ribbon-btn"><i class="fas fa-share-alt"></i> Share Page</button>
                </div>
                <div class="ribbon-group">
                    <button id="undoBtn" class="ribbon-btn"><i class="fas fa-undo"></i> Undo</button>
                    <button id="redoBtn" class="ribbon-btn"><i class="fas fa-redo"></i> Redo</button>
                </div>
                <div class="ribbon-group">
                    <button id="printBtn" class="ribbon-btn"><i class="fas fa-print"></i> Print</button>
                    <button id="pdfBtn" class="ribbon-btn"><i class="fas fa-file-pdf"></i> PDF</button>
                    <button id="wordBtn" class="ribbon-btn"><i class="fas fa-file-word"></i> Word</button>
                    <button id="pngBtn" class="ribbon-btn"><i class="fas fa-image"></i> PNG</button>
                </div>
            </div>

            <!-- Pages Tab -->
            <div class="ribbon-section">
                <div class="ribbon-group">
                    <button id="addPageBtn" class="ribbon-btn"><i class="fas fa-plus"></i> Add Page</button>
                    <button id="removePageBtn" class="ribbon-btn"><i class="fas fa-minus"></i> Remove Page</button>
                    <select id="pageSelect"></select>
                    <span id="pageInfo">Page 1/1</span>
                </div>
            </div>

            <!-- Insert Tab -->
            <div class="ribbon-section">
                <div class="ribbon-group">
                    <select id="categorySelect">
                        <option value="alphabet">🔤 Alphabet</option>
                        <option value="animals">🐾 Animals</option>
                        <option value="birds">🦜 Birds</option>
                        <option value="body">🧠 Body Parts</option>
                        <option value="foods">🍕 Foods</option>
                        <option value="fruits">🍎 Fruits</option>
                        <option value="vegetables">🥕 Vegetables</option>
                        <option value="transportation">🚗 Transport</option>
                        <option value="numbers">🔢 Numbers</option>
                        <option value="shapes">⬛ Shapes</option>
                        <option value="occupations">👨‍🏫 Occupations</option>
                        <option value="insects">🐜 Insects</option>
                        <option value="sea-animals">🐠 Sea Animals</option>
                        <option value="reptiles">🐍 Reptiles</option>
                        <option value="pots">🍳 Pots</option>
                        <option value="mixed">📦 Mixed</option>
                    </select>
                    <div id="imageLibrary" class="image-dropdown"></div>
                </div>
                <div class="ribbon-group">
                    <input type="text" id="newText" placeholder="Text" style="width:100px;">
                    <button id="addTextBtn" class="ribbon-btn"><i class="fas fa-plus"></i> Add</button>
                </div>
                <div class="ribbon-group">
                    <button id="addLineBtn" class="ribbon-btn"><i class="fas fa-minus"></i> Line</button>
                    <button id="addDottedBtn" class="ribbon-btn"><i class="fas fa-ellipsis-h"></i> Dotted</button>
                    <button id="addBoxBtn" class="ribbon-btn"><i class="fas fa-square"></i> Box</button>
                    <button id="addCircleBtn" class="ribbon-btn"><i class="fas fa-circle"></i> Circle</button>
                    <button id="addTracingBtn" class="ribbon-btn"><i class="fas fa-pencil-alt"></i> Tracing</button>
                </div>
            </div>

            <!-- Math Tab -->
            <div class="ribbon-section">
                <div class="ribbon-group">
                    <button id="addMathBtn" class="ribbon-btn"><i class="fas fa-plus-circle"></i> Addition</button>
                    <button id="addSubtractBtn" class="ribbon-btn"><i class="fas fa-minus-circle"></i> Subtraction</button>
                    <button id="addNumberLineBtn" class="ribbon-btn"><i class="fas fa-chart-line"></i> Number Line</button>
                </div>
                <div class="ribbon-group">
                    <button id="addWordBankBtn" class="ribbon-btn"><i class="fas fa-book"></i> Word Bank</button>
                    <button id="addColorByNumberBtn" class="ribbon-btn"><i class="fas fa-palette"></i> Color by Number</button>
                </div>
            </div>

            <!-- Format Tab -->
            <div class="ribbon-section">
                <div class="ribbon-group">
                    <select id="fontSelect">
                        <option value="Arial">Arial</option>
                        <option value="Comic Sans MS">Comic Sans</option>
                        <option value="Georgia">Georgia</option>
                    </select>
                    <select id="fontSizeSelect">
                        <option value="16">16px</option>
                        <option value="24">24px</option>
                        <option value="32">32px</option>
                        <option value="48">48px</option>
                    </select>
                    <input type="color" id="textColor" value="#000000">
                </div>
                <div class="ribbon-group">
                    <button id="boldBtn" class="ribbon-btn"><b>B</b></button>
                    <button id="italicBtn" class="ribbon-btn"><i>I</i></button>
                    <button id="underlineBtn" class="ribbon-btn"><u>U</u></button>
                </div>
                <div class="ribbon-group">
                    <button id="toggleGridBtn" class="ribbon-btn"><i class="fas fa-th"></i> Grid</button>
                    <button id="toggleSnapBtn" class="ribbon-btn"><i class="fas fa-magnet"></i> Snap</button>
                    <button id="showLayersBtn" class="ribbon-btn"><i class="fas fa-layer-group"></i> Layers</button>
                </div>
            </div>

            <!-- Edit Tab -->
            <div class="ribbon-section">
                <div class="ribbon-group">
                    <button id="copyBtn" class="ribbon-btn"><i class="fas fa-copy"></i> Copy</button>
                    <button id="pasteBtn" class="ribbon-btn"><i class="fas fa-paste"></i> Paste</button>
                    <button id="deleteBtn" class="ribbon-btn"><i class="fas fa-trash"></i> Delete</button>
                </div>
                <div class="ribbon-group">
                    <button id="bringFrontBtn" class="ribbon-btn"><i class="fas fa-arrow-up"></i> Front</button>
                    <button id="sendBackBtn" class="ribbon-btn"><i class="fas fa-arrow-down"></i> Back</button>
                </div>
                <div class="ribbon-group">
                    <button id="alignLeftBtn" class="ribbon-btn"><i class="fas fa-align-left"></i></button>
                    <button id="alignCenterBtn" class="ribbon-btn"><i class="fas fa-align-center"></i></button>
                    <button id="alignRightBtn" class="ribbon-btn"><i class="fas fa-align-right"></i></button>
                </div>
            </div>

            <!-- Assessment Tab -->
            <div class="ribbon-section">
                <div class="ribbon-group">
                    <button id="addMcqBtn" class="ribbon-btn"><i class="fas fa-check-square"></i> Add MCQ</button>
                    <button id="addFillBlankBtn" class="ribbon-btn"><i class="fas fa-edit"></i> Fill Blank</button>
                    <button id="gradeBtn" class="ribbon-btn"><i class="fas fa-chart-bar"></i> Grade</button>
                </div>
            </div>

            <!-- Zoom -->
            <div class="ribbon-section">
                <div class="ribbon-group">
                    <button id="zoomOutBtn" class="ribbon-btn"><i class="fas fa-search-minus"></i></button>
                    <span id="zoomLevel">100%</span>
                    <button id="zoomInBtn" class="ribbon-btn"><i class="fas fa-search-plus"></i></button>
                    <button id="zoomResetBtn" class="ribbon-btn">Reset</button>
                </div>
                <div class="ribbon-group">
                    <span>Selected: <span id="selectedCount">0</span></span>
                </div>
            </div>
        </div>

        <!-- Canvas Area -->
        <div class="canvas-container">
            <div class="canvas-wrapper" id="canvasWrapper">
                <div id="pagesContainer" class="pages-container">
                    <div id="page1" class="a4-canvas active-page">
                        <div class="canvas-inner">
                            <div class="default-message">
                                <i class="fas fa-hand-pointer"></i>
                                Click on images from library | Drag to move | Click to select
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Reactions Panel -->
        <div class="reactions-panel" id="reactionsPanel">
            <div class="reactions-title">
                <i class="fas fa-heart"></i> How do you like this tool?
            </div>
            <div class="reactions-container">
                <div class="reaction-item" data-reaction="like">
                    <div class="reaction-emoji">👍</div>
                    <span class="reaction-count" id="likeCount">0</span>
                </div>
                <div class="reaction-item" data-reaction="love">
                    <div class="reaction-emoji">❤️</div>
                    <span class="reaction-count" id="loveCount">0</span>
                </div>
                <div class="reaction-item" data-reaction="wow">
                    <div class="reaction-emoji">😮</div>
                    <span class="reaction-count" id="wowCount">0</span>
                </div>
                <div class="reaction-item" data-reaction="sad">
                    <div class="reaction-emoji">😢</div>
                    <span class="reaction-count" id="sadCount">0</span>
                </div>
                <div class="reaction-item" data-reaction="angry">
                    <div class="reaction-emoji">😠</div>
                    <span class="reaction-count" id="angryCount">0</span>
                </div>
                <div class="reaction-item" data-reaction="laugh">
                    <div class="reaction-emoji">😂</div>
                    <span class="reaction-count" id="laughCount">0</span>
                </div>
                <div class="reaction-item" data-reaction="celebrate">
                    <div class="reaction-emoji">🎉</div>
                    <span class="reaction-count" id="celebrateCount">0</span>
                </div>
            </div>
        </div>

        <!-- Social Share Panel -->
        <div class="share-panel" id="sharePanel">
            <div class="share-title">
                <i class="fas fa-share-alt"></i> Share this tool
            </div>
            <div class="share-buttons">
                <button class="share-btn facebook" data-platform="facebook">
                    <i class="fab fa-facebook-f"></i> Facebook
                </button>
                <button class="share-btn twitter" data-platform="twitter">
                    <i class="fab fa-twitter"></i> Twitter
                </button>
                <button class="share-btn linkedin" data-platform="linkedin">
                    <i class="fab fa-linkedin-in"></i> LinkedIn
                </button>
                <button class="share-btn whatsapp" data-platform="whatsapp">
                    <i class="fab fa-whatsapp"></i> WhatsApp
                </button>
                <button class="share-btn email" data-platform="email">
                    <i class="fas fa-envelope"></i> Email
                </button>
            </div>
        </div>

        <!-- Layers Panel -->
        <div id="layersPanel" class="layers-panel">
            <div class="layers-header">
                <span><i class="fas fa-layer-group"></i> Layers</span>
                <button id="closeLayersBtn" class="close-btn">✖</button>
            </div>
            <div id="layersList" class="layers-list"></div>
        </div>

        <!-- Assessment Panel -->
        <div id="assessmentPanel" class="assessment-panel" style="display:none;">
            <div class="assessment-header">
                <span><i class="fas fa-chart-bar"></i> Assessment Results</span>
                <button id="closeAssessmentBtn" class="close-btn">✖</button>
            </div>
            <div id="assessmentResults" class="assessment-results"></div>
        </div>

        <!-- Toast Notification Container -->
        <div id="toastContainer" class="toast-container"></div>

        <!-- Scroll Buttons -->
        <button id="scrollUpBtn" class="scroll-btn scroll-up" style="display: none;">
            <i class="fas fa-arrow-up"></i>
        </button>
        <button id="scrollDownBtn" class="scroll-btn scroll-down">
            <i class="fas fa-arrow-down"></i>
        </button>

        <!-- Footer -->
        <div class="app-footer">
            <p>© 2024 MagicRills.com | ECCE Worksheet Maker</p>
        </div>
    </div>

    <!-- Loading Spinner -->
    <div id="loadingSpinner" class="loading-spinner" style="display: none;">
        <div class="spinner"></div>
        <p>Loading...</p>
    </div>

    <script src="worksheet-maker-for-ecce-teachers.js"></script>
</body>
</html>
